backend:
  name: git-gateway
  branch: master

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Artigos
    folder: src/data/blog
    create: true
    extension: mdx
    format: frontmatter
    slug: "{{slug}}"
    fields:
      # ── Básico ──────────────────────────────────────────────
      - { label: Título, name: title, widget: string }
      - { label: Meta Title (SEO), name: metaTitle, widget: string, required: false, hint: "Se vazio, usa o título do post. Ideal: até 60 caracteres." }
      - { label: Descrição / Meta Description, name: description, widget: text, hint: "Ideal: entre 140 e 160 caracteres." }
      - { label: Rascunho (não publicar), name: draft, widget: boolean, default: false }
      - { label: Data de publicação, name: pubDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Data de atualização, name: updatedDate, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, required: false, hint: "Preencha quando atualizar o conteúdo — sinaliza ao Google que o post é fresco." }
      - { label: Autor, name: author, widget: string, default: "Sonar Musical" }

      # ── Classificação ────────────────────────────────────────
      - label: Categoria
        name: category
        widget: select
        options:
          - Guitarras
          - Amplificadores
          - Pedais
          - Acessórios
          - Guias de Compra
          - Dicas para Iniciantes
          - Home Studio
          - Reviews
          - Tutoriais
          - Técnica e Teoria
          - Violões
      - label: Nível de dificuldade
        name: level
        widget: select
        required: false
        options:
          - { label: Iniciante, value: iniciante }
          - { label: Intermediário, value: intermediario }
          - { label: Avançado, value: avancado }
      - { label: Tags, name: tags, widget: list, required: false, field: { label: Tag, name: item, widget: string } }
      - { label: Destaque na home, name: featured, widget: boolean, default: false }
      - { label: Noindex (não indexar no Google), name: noindex, widget: boolean, default: false, hint: "Ative apenas para rascunhos ou páginas de teste." }

      # ── Imagens ──────────────────────────────────────────────
      - { label: Imagem de capa, name: image, widget: image, required: false }
      - { label: Alt text da imagem de capa, name: imageAlt, widget: string, required: false, hint: "Descreva a imagem para acessibilidade e SEO." }
      - { label: Imagem Open Graph (redes sociais), name: ogImage, widget: image, required: false, hint: "Se vazio, usa a imagem de capa. Tamanho ideal: 1200x630px." }

      # ── Schema / Rich Results ─────────────────────────────────
      - label: Tipo de conteúdo (Schema)
        name: schemaType
        widget: select
        required: false
        default: Article
        options:
          - { label: Artigo, value: Article }
          - { label: Review / Análise, value: Review }
          - { label: Guia passo a passo, value: HowTo }
      - label: Avaliação (1 a 5)
        name: rating
        widget: number
        value_type: float
        min: 1
        max: 5
        step: 0.5
        required: false
        hint: "Usado apenas em posts do tipo Review."
      - { label: Pontos positivos, name: pros, widget: list, required: false, field: { label: Ponto positivo, name: item, widget: string } }
      - { label: Pontos negativos, name: cons, widget: list, required: false, field: { label: Ponto negativo, name: item, widget: string } }

      # ── Afiliados ─────────────────────────────────────────────
      - { label: Post patrocinado, name: sponsored, widget: boolean, default: false, hint: "Adiciona disclaimer de conteúdo patrocinado no topo do post." }
      - label: Produtos afiliados
        name: produtos
        widget: list
        required: false
        hint: "Adicione os produtos que aparecem no post. Serão usados para gerar os CTAs."
        fields:
          - { label: Nome do produto, name: nome, widget: string }
          - { label: Descrição curta, name: descricao, widget: string, required: false }
          - { label: Preço, name: preco, widget: string, required: false, hint: "Ex: A partir de R$ 2.800" }
          - { label: Imagem do produto, name: imagem, widget: image, required: false }
          - { label: Alt text da imagem, name: imagemAlt, widget: string, required: false }
          - { label: URL afiliado, name: url, widget: string }

      # ── Nota do editor ────────────────────────────────────────
      - { label: Nota do editor, name: editorNote, widget: text, required: false, hint: "Aparece em destaque no topo do post. Use para atualizações importantes." }

      # ── Conteúdo ──────────────────────────────────────────────
      - { label: Conteúdo, name: body, widget: markdown }

  - name: bandas
    label: Bandas
    folder: src/data/bandas
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: Nome da banda, name: nome, widget: string }
      - label: Gênero
        name: genero
        widget: select
        options: [Rock, Metal, Blues, Pop, Jazz, "R&B", Sertanejo, Nacional]
      - { label: Origem, name: origem, widget: string, hint: "Ex: Londres, Reino Unido" }
      - { label: Ano de formação, name: ano, widget: number, value_type: int }
      - { label: Descrição curta (blurb), name: blurb, widget: text, hint: "1-2 frases sobre o som/estilo da banda." }
      - { label: Foto de capa, name: fotoCapa, widget: image, required: false, hint: "Aparece esticada em banner de largura total. Envie no mínimo 1600×600px (paisagem) para não pixelizar." }
      - { label: Alt text da foto de capa, name: fotoCapaAlt, widget: string, required: false }
      - { label: Enquadramento vertical da foto de capa, name: fotoCapaPosition, widget: number, required: false, min: 0, max: 100, hint: "0 = topo da foto, 100 = base. Padrão 20 (perto do topo, onde geralmente ficam os rostos). Ajuste se algum integrante aparecer cortado no banner." }
      - label: Integrantes
        name: integrantes
        widget: list
        summary: "{{fields.nome}} — {{fields.funcao}}"
        fields:
          - { label: Nome, name: nome, widget: string }
          - { label: Função, name: funcao, widget: string, hint: "Ex: Guitarra, Baixo, Vocal" }
          - { label: Foto, name: foto, widget: image, required: false, hint: "Aparece em avatar circular e em cards. Envie no mínimo 600×600px." }
          - { label: Alt text da foto, name: fotoAlt, widget: string, required: false }
          - { label: Anos na banda, name: anos, widget: string, required: false, hint: "Ex: 1981 – hoje" }
          - { label: Status, name: status, widget: string, required: false, hint: "Ex: Membro fundador" }
          - { label: Inspirações, name: inspiracoes, widget: string, required: false }
          - { label: Resumo / biografia, name: resumo, widget: text, required: false }
          - { label: Pontos de estilo (2 traços), name: pontos, widget: list, required: false, field: { label: Ponto, name: item, widget: string } }
          - label: Setup de equipamentos
            name: setup
            widget: list
            required: false
            summary: "{{fields.tipo}}"
            fields:
              - { label: Tipo (categoria do equipamento), name: tipo, widget: string, hint: "Ex: Guitarra, Amplificação, Bateria" }
              - label: Original
                name: original
                widget: object
                required: false
                fields:
                  - { label: Nome do produto, name: nome, widget: string }
                  - { label: Preço, name: preco, widget: string, required: false, hint: "Ex: ~R$ 12.000" }
                  - { label: URL afiliado, name: urlAfiliado, widget: string, required: false }
              - label: Versão low cost
                name: low
                widget: object
                required: false
                fields:
                  - { label: Nome do produto, name: nome, widget: string }
                  - { label: Preço, name: preco, widget: string, required: false }
                  - { label: Observação, name: obs, widget: string, required: false, hint: "Por que é uma boa alternativa." }
                  - { label: URL afiliado, name: urlAfiliado, widget: string, required: false }
      - label: Álbuns
        name: albuns
        widget: list
        required: false
        summary: "{{fields.nome}} ({{fields.ano}})"
        fields:
          - { label: Nome do álbum, name: nome, widget: string }
          - { label: Ano de lançamento, name: ano, widget: number, required: false, value_type: int }
          - { label: Descrição curta, name: descricao, widget: text, hint: "1-2 frases sobre o álbum." }
          - { label: Capa do álbum, name: capa, widget: image, required: false, hint: "Formato quadrado (1:1). Envie no mínimo 800×800px." }
          - { label: Alt text da capa, name: capaAlt, widget: string, required: false }
          - { label: Link do Spotify, name: spotifyUrl, widget: string, required: false, hint: "Cole o link do álbum no Spotify. Se deixar em branco, o botão abre uma busca pelo álbum no Spotify." }
          - { label: Link para mais informações, name: saibaMaisUrl, widget: string, required: false, hint: "Ex: página da Wikipédia sobre o álbum. Se deixar em branco, o botão abre uma busca na Wikipédia." }
